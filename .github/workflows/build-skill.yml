name: Build and publish .skill

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run release tests
        run: python -m unittest discover -s tests/release -v

      - name: Package skill archive
        run: |
          STAGE="bpmn-process-modeler"
          mkdir -p "build/$STAGE"
          cp SKILL.md README.md LICENSE CONTRIBUTING.md SECURITY.md "build/$STAGE/"
          cp -r references "build/$STAGE/"
          cd build
          zip -r "../bpmn-process-modeler.skill" "$STAGE"

      - name: Verify skill archive
        run: |
          unzip -t bpmn-process-modeler.skill
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/SKILL.md'
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/README.md'
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/LICENSE'
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/CONTRIBUTING.md'
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/SECURITY.md'
          unzip -l bpmn-process-modeler.skill | grep 'bpmn-process-modeler/references/camunda-knowledge-snapshot.md'

      - name: Report release asset upload policy
        run: |
          echo "Release upload policy: overwrite_files=true."
          echo "Repeated tag pushes are allowed only for explicit release repair with an unchanged target commit."

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bpmn-process-modeler.skill
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
